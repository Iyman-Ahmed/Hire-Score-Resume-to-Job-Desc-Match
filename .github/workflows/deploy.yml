name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          # Push to HF Spaces via HTTPS with token auth
          git push https://Iyman-ahmed:$HF_TOKEN@huggingface.co/spaces/Iyman-ahmed/Hire-Score-Resume-to-Job-Desc-Match main --force
